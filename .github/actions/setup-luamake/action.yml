name: Setup LuaMake
description: Add the repository-pinned LuaMake binary to PATH

inputs:
  soluna_path:
    description: "The path to the Soluna repository. Defaults to ."
    required: false
    default: "."

runs:
  using: "composite"
  steps:
    - name: Add LuaMake to PATH
      shell: bash
      working-directory: ${{ inputs.soluna_path }}
      run: |
        case "${RUNNER_OS}-${RUNNER_ARCH}" in
          Linux-X64)
            luamake_platform=linux
            ;;
          Linux-ARM64)
            luamake_platform=linux_arm64
            ;;
          macOS-X64)
            luamake_platform=osx
            ;;
          macOS-ARM64)
            luamake_platform=osx_arm64
            ;;
          Windows-*)
            luamake_platform=win32
            ;;
          *)
            echo "Unsupported LuaMake runner: ${RUNNER_OS}-${RUNNER_ARCH}" >&2
            exit 1
            ;;
        esac

        if [ "$RUNNER_OS" = "Windows" ]; then
          soluna_root=$(pwd -W 2>/dev/null || pwd -P)
          soluna_root=${soluna_root//\\//}
          luamake_exe=luamake.exe
        else
          soluna_root=$(pwd -P)
          luamake_exe=luamake
        fi

        luamake_dir="$soluna_root/bin/luamake-bin/bin/$luamake_platform"
        if [ ! -f "$luamake_dir/$luamake_exe" ]; then
          echo "LuaMake binary not found: $luamake_dir/$luamake_exe" >&2
          exit 1
        fi
        if [ "$RUNNER_OS" != "Windows" ]; then
          chmod +x "$luamake_dir/$luamake_exe"
        fi
        echo "$luamake_dir" >> "$GITHUB_PATH"
